name: Deploy to production

# Авто-деплой на прод-VDS (ralph-prod → https://pixeltanks.ru) при пуше в main.
# GitHub-раннер заходит по SSH под пользователем deploy и запускает scripts/deploy-remote.sh
# (git reset → build → restart → healthcheck → автооткат при провале).
on:
    push:
        branches: [main]
    workflow_dispatch: # ручной запуск из вкладки Actions

# Деплои не должны накладываться друг на друга; текущий не отменяем, ждём его завершения.
concurrency:
    group: deploy-production
    cancel-in-progress: false

jobs:
    deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout (нужен только scripts/deploy-remote.sh)
              # Запиннено по SHA (supply chain); # v5.0.0
              uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09
              with:
                  persist-credentials: false # GITHUB_TOKEN не нужен после checkout

            - name: Настроить SSH-ключ и known_hosts
              env:
                  DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
                  DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
              run: |
                  mkdir -p ~/.ssh
                  printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
                  chmod 644 ~/.ssh/known_hosts

            - name: Деплой по SSH
              env:
                  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
                  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
              run: |
                  ssh -i ~/.ssh/id_ed25519 \
                      -o StrictHostKeyChecking=yes \
                      -o BatchMode=yes \
                      "$DEPLOY_USER@$DEPLOY_HOST" \
                      'bash -s' < scripts/deploy-remote.sh
